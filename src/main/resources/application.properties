
spring.application.name=belajar-spring-restfull-api
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/hris_spring
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# Hikari Connection Pool Configuration
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=BelajarRestfulApiPool

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Port
server.port = 8081


# ===================================================================
# 2. KONFIGURASI CACHE & SESSION (REDIS)
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===================================================================
# 3. KONFIGURASI MESSAGE BROKER (RABBITMQ)
# ===================================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ===================================================================
# 4. KONFIGURASI SEARCH ENGINE (ELASTICSEARCH)
# ===================================================================
spring.elasticsearch.uris=http://localhost:9200

# Memaksa Spring Boot menampilkan detail eror secara lengkap di konsol
logging.level.org.springframework.web=DEBUG
logging.level.programmerzamannow=DEBUG