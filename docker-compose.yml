version: '3.8'

services:
  # 1. DATABASE UTAMA (Milik Ama)
  db:
    image: mysql:8.0
    container_name: mysql-belajar
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: belajar_spring
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. visualisasi MYSQL (Milik Ama)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin-belajar
    restart: always
    links:
      - db
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    ports:
      - "8080:80"

  # 3. MESSAGE BROKER + UI DASBOR
  rabbitmq:
    image: rabbitmq:3.11-management-alpine
    container_name: rabbitmq-belajar
    restart: always
    ports:
      - "5672:5672"   # Jalur kode Java Spring Boot Ama
      - "15672:15672" # UI Dasbor di Browser
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # 4. MEMORY CACHE & SESSION
  redis:
    image: redis:7.0-alpine
    container_name: redis-belajar
    restart: always
    ports:
      - "6379:6379"   
    volumes:
      - redis_data:/data

  # 4b. VISUALISASI REDIS
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redisinsight-belajar
    restart: always
    ports:
      - "5540:5540"   
    volumes:
      - redisinsight_data:/data

  # 5. MESIN PENCARI PINTAR (Di-downgrade ke 8.15.2 agar RINGAN & COCOK dengan Spring Boot 4.x)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: elasticsearch-belajar
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Dimatikan agar tidak pusing token/password saat belajar
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Alokasi RAM dikunci aman di 512MB
    ports:
      - "9200:9200"   
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # 5b. VISUALISASI ELASTICSEARCH (Versinya wajib DISAMAKAN dengan Elasticsearch)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.2
    container_name: kibana-belajar
    restart: always
    environment:
      # Perbaikan: Diarahkan ke nama container yang benar 'elasticsearch-belajar'
      - ELASTICSEARCH_HOSTS=http://elasticsearch-belajar:9200 
    ports:
      - "5601:5601"   
    depends_on:
      - elasticsearch

volumes:
  mysql_data:
  rabbitmq_data: 
  redis_data:    
  redisinsight_data: 
  es_data: